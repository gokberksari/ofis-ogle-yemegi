name: Ofis Yemek Menüsü Bot

on:
  schedule:
    # Hedef TR 06:53 — GitHub Actions kuyruk gecikmesi (gözlemlenen ~2-2.5 saat) sonrası
    # mesaj 09:00-09:30 civarına düşer. Önceki ayar (07 UTC) 12:30-13:00'a kayıyordu,
    # 3.5 saat öne çekildi. Saat-başı (`:00`) slotları kalabalık olduğu için 53. dakika seçildi.
    - cron: '53 3 * * 1-5'  # Hafta içi sadece (Pazartesi-Cuma)
  
  # Manuel tetikleme
  workflow_dispatch:
    inputs:
      test_date:
        description: 'Test için tarih (YYYY-MM-DD formatında, örn: 2025-08-01)'
        required: false
        default: ''

jobs:
  yemek-bildirimi:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout kod
      uses: actions/checkout@v4
    
    - name: Python kurulumu
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Bağımlılıkları yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Yemek Menüsü Bot'u çalıştır
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_CHANNEL: '#ogle-yemegi'
        TEST_DATE: ${{ github.event.inputs.test_date || '' }}
      run: python yemek_bot.py
