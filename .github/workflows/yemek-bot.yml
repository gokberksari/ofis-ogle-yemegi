name: Ofis Yemek Menüsü Bot

on:
  schedule:
    # Hedef TR 10:23 — GitHub Actions kuyruk gecikmesiyle ~11:00 civarına denk gelir.
    # Saat-başı (`:00`) slotları kalabalık olduğu için tek bir dakika seçildi.
    - cron: '23 7 * * 1-5'  # Hafta içi sadece (Pazartesi-Cuma)
  
  # Manuel tetikleme
  workflow_dispatch:
    inputs:
      test_date:
        description: 'Test için tarih (YYYY-MM-DD formatında, örn: 2025-08-01)'
        required: false
        default: ''

jobs:
  yemek-bildirimi:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout kod
      uses: actions/checkout@v4
    
    - name: Python kurulumu
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Bağımlılıkları yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Yemek Menüsü Bot'u çalıştır
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_CHANNEL: '#ogle-yemegi'
        TEST_DATE: ${{ github.event.inputs.test_date || '' }}
      run: python yemek_bot.py
